<!DOCTYPE html>
<html>
<head>

<title>CyberShield IDS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="text-center mb-4">
CyberShield IDS Dashboard
</h1>

<div class="row">

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>Total Packets</h5>
<h2>{{ result.total }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>TCP</h5>
<h2>{{ result.tcp }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>UDP</h5>
<h2>{{ result.udp }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>ICMP</h5>
<h2>{{ result.icmp }}</h2>
</div>
</div>
</div>

</div>

<br>

<div class="card">

<div class="card-body">

<h3>Risk Assessment</h3>

<h2>{{ result.risk }}</h2>

<p>{{ result.message }}</p>

</div>

</div>

<br>

<a href="/" class="btn btn-primary">
Analyze Another PCAP
</a>

</div>

</body>
</html>
